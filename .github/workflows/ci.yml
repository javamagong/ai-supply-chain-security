name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Test installation
        run: |
          python --version
          pip install -r requirements.txt

      - name: Run smoke tests
        run: |
          python -c "
          from auto_scanner import AutoSecurityScanner, DependencyChecker
          from ai_scanner import SecurityScanner
          scanner = AutoSecurityScanner()
          checker = DependencyChecker()
          print('Import and instantiation: OK')
          "
          python ai-scanner.py --help > /dev/null
          echo "CLI help: OK"

      - name: Run scanner self-check
        run: |
          python ai-scanner.py -d examples --no-recursive

  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Security scan
        run: |
          pip install -r requirements.txt
          python ai-scanner.py -d . --ci -f json -o security-report.json
          EXIT_CODE=$?
          # Exit code 1 = warnings only (fail_on_warning=false in config), treat as pass
          # Exit code 2 = critical findings, fail the build
          if [ $EXIT_CODE -eq 2 ]; then
            echo "CRITICAL security issues found, failing build"
            exit 1
          fi
          exit 0

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-report
          path: security-report.json
