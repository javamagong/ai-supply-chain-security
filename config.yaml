# AI Security Scanner v2.0 Configuration
# 跨平台配置文件，支持 Windows/macOS/Linux

# 扫描路径（支持多个）
scan_paths:
  - ./projects
  - ~/work
  - ~/dev

# 排除模式（glob 风格）
exclude_patterns:
  - "**/node_modules/**"
  - "**/dist/**"
  - "**/build/**"
  - "**/.git/**"
  - "**/__pycache__/**"
  - "**/venv/**"
  - "**/.venv/**"
  - "**/vendor/**"
  - "**/*.min.js"
  - "**/*.bundle.js"

# 启用的检测规则
rules:
  enabled:
    # ── 高危：远程代码执行 ──
    - HOOK-001  # curl | bash
    - HOOK-002  # wget | bash
    - HOOK-003  # bash -c curl
    # ── 高危：破坏性命令 ──
    - HOOK-004  # rm -rf
    - HOOK-005  # del /s /q
    - HOOK-006  # format X:
    # ── 高危：权限提升 ──
    - HOOK-007  # chmod 777
    - HOOK-008  # sudo rm/chmod
    # ── 中危：代码执行 ──
    - HOOK-010  # eval()
    - HOOK-011  # python -c
    - HOOK-012  # node -e
    - HOOK-013  # powershell
    - HOOK-014  # base64 --decode
    # ── 中危：网络后门 ──
    - HOOK-020  # nc -e
    - HOOK-021  # bash /dev/tcp
    - HOOK-022  # curl -o *.sh
    # ── 供应链：npm ──
    - SUPPLY-001  # postinstall 危险命令
    - SUPPLY-002  # preinstall 危险命令
    - SUPPLY-003  # prepare 可疑命令
    # ── 供应链：Python ──
    - SUPPLY-010  # git URL 依赖
    - SUPPLY-011  # 非官方 PyPI 索引（依赖混淆）
    - SUPPLY-012  # setup.py cmdclass
    - SUPPLY-013  # setup.py os.system/subprocess
    # ── 供应链：GitHub Actions ──
    - SUPPLY-020  # Action 引用未固定分支（CRITICAL）
    - SUPPLY-021  # Action 引用短 SHA（INFO）
    # ── Claude Code / AI 助手 ──
    - CLAUDE-001  # MCP 服务器外部 URL
    - CLAUDE-002  # Prompt 注入攻击
    - CLAUDE-003  # hooks 调用外部 URL
    - CLAUDE-004  # hooks 引用敏感环境变量
    - CLAUDE-005  # 隐藏 Unicode 字符
    # ── 代码混淆 ──
    - OBFUSC-001  # 十六进制编码字符串
    - OBFUSC-002  # exec/eval + base64 decode
    - OBFUSC-003  # __import__ 动态导入敏感模块
    - OBFUSC-004  # chr() 逐字符构建字符串
    - OBFUSC-005  # exec(compile(...))
    - OBFUSC-006  # exec(bytes.fromhex(...))

  # 信息级别规则（默认禁用，按需开启）
  disabled:
    - HOOK-030  # npm install -g
    - HOOK-031  # pip install
    - HOOK-032  # cargo install

# 扫描的文件类型
scan:
  file_types:
    # AI 助手配置
    - settings.json
    - config.json
    - CLAUDE.md
    - .cursorrules
    # 包管理器
    - package.json
    - requirements.txt
    - requirements-dev.txt
    - Pipfile
    - pyproject.toml
    - setup.py
    - setup.cfg
    - Cargo.toml
    # CI/CD
    - "*.yml"
    - "*.yaml"

  # 最大文件大小（MB）
  max_file_size: 10

  # 目录递归深度（-1 为无限制）
  max_depth: -1

  # 是否跟随符号链接
  follow_symlinks: false

# 报告设置
report:
  format: json          # text | json | markdown
  output_dir: ./reports
  retention_days: 30
  include_safe_files: false

# 通知设置
notifications:
  # 邮件通知
  email:
    enabled: false
    smtp_server: smtp.example.com
    smtp_port: 587
    use_tls: true
    username: security@example.com
    password_env: SMTP_PASSWORD  # 从环境变量读取，不要硬编码
    from_addr: ai-scanner@example.com
    to_addrs:
      - security-team@example.com

  # Webhook 通知（Slack / Discord / 钉钉）
  webhook:
    enabled: false
    url_env: SECURITY_WEBHOOK_URL  # 从环境变量读取
    type: slack           # slack | discord | dingtalk | custom

  # 系统原生通知
  system:
    enabled: true   # macOS: osascript  Windows: toast  Linux: notify-send

# CI/CD 模式
ci:
  fail_on_critical: true   # 发现 CRITICAL 时返回退出码 2
  fail_on_warning: false   # 发现 WARNING 时返回退出码 1
  output_format: json
  upload_artifact: true

# 性能
performance:
  parallel_files: 4
  use_cache: true
  cache_ttl_hours: 24
